<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>Week 1 單字片語 Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F9FC;font-family:-apple-system,"Segoe UI",system-ui,sans-serif;padding-bottom:40px}
.header{background:#1A3C6E;color:#fff;padding:18px 20px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-title{font-size:18px;font-weight:900}
.header-sub{font-size:11px;opacity:.7}
.progress-bar-wrap{background:rgba(255,255,255,.2);border-radius:20px;height:8px;overflow:hidden}
.progress-bar{background:#E8501A;height:8px;border-radius:20px;transition:width .3s}
.progress-text{font-size:11px;opacity:.8;margin-top:4px;text-align:right}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:12px 16px 0;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{background:#fff;border:1.5px solid #D8E2F0;color:#6B7A99;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s}
.filter-btn.active{background:#1A3C6E;border-color:#1A3C6E;color:#fff}
.filter-btn.done-filter{background:#1A7A4A;border-color:#1A7A4A;color:#fff}
.content{padding:12px 16px;max-width:680px;margin:0 auto}
.section-header{display:flex;align-items:center;gap:8px;margin:18px 0 8px}
.section-label{background:#1A3C6E;color:#fff;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:800;letter-spacing:.5px}
.section-title{font-size:14px;font-weight:800;color:#1A3C6E}
.section-count{font-size:11px;color:#6B7A99;margin-left:auto}
.word-item{background:#fff;border:1.5px solid #D8E2F0;border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.word-item.checked{border-color:#1A7A4A;background:#F0FAF4}
.word-item.checked .word-en{color:#1A7A4A}
.word-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #D8E2F0;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.word-item.checked .checkbox{background:#1A7A4A;border-color:#1A7A4A}
.check-icon{color:#fff;font-size:13px;display:none}
.word-item.checked .check-icon{display:block}
.word-main{flex:1;min-width:0}
.word-en{font-weight:800;font-size:14px;color:#1A3C6E;line-height:1.3}
.word-pos{display:inline-block;background:#EAF0FB;color:#1A3C6E;border-radius:4px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:5px;vertical-align:middle}
.word-zh{font-size:13px;color:#E8501A;font-weight:600;margin-top:1px;display:none}
.word-item.open .word-zh{display:block}
.expand-btn{color:#6B7A99;font-size:12px;flex-shrink:0;padding:4px}
.word-detail{display:none;padding:0 14px 12px 46px;font-size:13px;border-top:1px solid #EAF0FB}
.word-item.open .word-detail{display:block}
.detail-note{background:#EAF0FB;border-radius:6px;padding:6px 10px;color:#1A3C6E;margin-bottom:6px;line-height:1.5}
.detail-syn{color:#6B7A99;margin-bottom:4px}
.detail-syn span{color:#1A7A4A;font-weight:600}
.detail-ex{font-style:italic;color:#333;margin-bottom:2px;line-height:1.5}
.detail-ex-zh{color:#6B7A99;margin-bottom:6px}
.reset-btn{background:#fff;border:1.5px solid #D8E2F0;color:#6B7A99;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.dialog-overlay.show{display:flex}
.dialog-box{background:#fff;border-radius:14px;padding:24px 20px;max-width:280px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.dialog-title{font-size:15px;font-weight:800;color:#1A3C6E;margin-bottom:8px}
.dialog-msg{font-size:13px;color:#555;margin-bottom:20px;line-height:1.5}
.dialog-btns{display:flex;gap:10px}
.dialog-btn{flex:1;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer}
.dialog-btn-cancel{background:#F5F7FA;color:#6B7A99}
.dialog-btn-confirm{background:#E8501A;color:#fff}
.word-item.hidden{display:none}
</style>
</head>

</div>

</div>

<div class="content" id="main-content"></div>

// ── STORAGE ───────────────────────────────────────────
function getChecked(){try{const r=localStorage.getItem('w1_checked');return r?JSON.parse(r):{}}catch(e){return {}}}
function saveChecked(d){try{localStorage.setItem('w1_checked',JSON.stringify(d))}catch(e){}}
let checked=getChecked();
let currentFilter='all';

function getAllWords(){const a=[];sections.forEach(s=>s.words.forEach(w=>a.push({...w,section:s.id})));return a}
function getKey(sid,en){return sid+'::'+en}
function updateProgress(){
  const all=getAllWords(),total=all.length,done=all.filter(w=>checked[getKey(w.section,w.en)]).length;
  document.getElementById('total-count').textContent=total;
  document.getElementById('total-count2').textContent=total;
  document.getElementById('done-count').textContent=done;
  document.getElementById('progress-bar').style.width=(total>0?Math.round(done/total*100):0)+'%';
}
function renderAll(){
  const container=document.getElementById('main-content');
  container.innerHTML='';
  sections.forEach(sec=>{
    const secDiv=document.createElement('div');
    secDiv.className='section-block';secDiv.dataset.secid=sec.id;
    const done=sec.words.filter(w=>checked[getKey(sec.id,w.en)]).length;
    const hdr=document.createElement('div');hdr.className='section-header';
    hdr.innerHTML=`<span class="section-label">${sec.label}</span><span class="section-title">${sec.title}</span><span class="section-count">${done}/${sec.words.length}</span>`;
    secDiv.appendChild(hdr);
    sec.words.forEach(w=>{
      const key=getKey(sec.id,w.en),isC=!!checked[key];
      const item=document.createElement('div');
      item.className='word-item'+(isC?' checked':'');
      item.dataset.section=sec.id;item.dataset.checked=isC?'1':'0';
      item.innerHTML=`
        <div class="word-row">
          <div class="checkbox" onclick="toggleCheck(this,'${key}','${sec.id}')"><span class="check-icon">✓</span></div>
          <div class="word-main" onclick="toggleExpand(this.closest('.word-item'))">
            <div class="word-en">${w.en}<span class="word-pos">${w.pos}</span></div>
            <div class="word-zh">${w.zh}</div>
          </div>
          <span class="expand-btn" onclick="toggleExpand(this.closest('.word-item'))">▼</span>
        </div>
        <div class="word-detail">
          ${w.note?`<div class="detail-note">${w.note}</div>`:''}
          ${w.syn?`<div class="detail-syn">≈ 近義：<span>${w.syn}</span></div>`:''}
          <div class="detail-ex">${w.ex}</div>
          <div class="detail-ex-zh">${w.exzh}</div>
        </div>`;
      secDiv.appendChild(item);
    });
    container.appendChild(secDiv);
  });
  applyFilter(currentFilter);updateProgress();
}
function toggleCheck(cb,key,secId){
  event.stopPropagation();
  const item=cb.closest('.word-item'),nowC=!item.classList.contains('checked');
  item.classList.toggle('checked',nowC);item.dataset.checked=nowC?'1':'0';
  if(nowC)checked[key]=true;else delete checked[key];
  saveChecked(checked);updateProgress();updateSectionCount(secId);
  if(currentFilter==='未學'&&nowC)item.classList.add('hidden');
  if(currentFilter==='已掌握'&&!nowC)item.classList.add('hidden');
}
function toggleExpand(item){
  item.classList.toggle('open');
  item.querySelector('.expand-btn').textContent=item.classList.contains('open')?'▲':'▼';
}
function updateSectionCount(secId){
  const sec=sections.find(s=>s.id===secId);if(!sec)return;
  const done=sec.words.filter(w=>checked[getKey(secId,w.en)]).length;
  const hdr=document.querySelector(`.section-block[data-secid="${secId}"] .section-count`);
  if(hdr)hdr.textContent=`${done}/${sec.words.length}`;
}
function setFilter(filter){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilter(filter);
}
function applyFilter(filter){
  document.querySelectorAll('.section-block').forEach(sec=>{
    let vis=false;
    sec.querySelectorAll('.word-item').forEach(item=>{
      const isC=item.dataset.checked==='1';
      let show=true;
      if(filter==='未學')show=!isC;
      else if(filter==='已掌握')show=isC;
      else if(filter.startsWith('sec'))show=(item.dataset.section===filter);
      item.classList.toggle('hidden',!show);
      if(show)vis=true;
    });
    const hdr=sec.querySelector('.section-header');
    if(hdr)hdr.style.display=vis?'flex':'none';
  });
}
function resetAll(){document.getElementById('reset-dialog').classList.add('show')}
function closeDialog(){document.getElementById('reset-dialog').classList.remove('show')}
function confirmReset(){closeDialog();checked={};saveChecked(checked);renderAll()}
renderAll();
</script>
